<!DOCTYPE>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>Inversive Space</title>

    <meta name="author" content="Gianluca Casati">
    <meta name="description" content="is Gianluca Casati's visiting card">

    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">

    <link rel="canonical" href="https://inversive.space"/>

    <meta name="theme-color" content="#333333">
    <meta name="msapplication-navbutton-color" content="#333333">
    <meta name="apple-mobile-web-app-status-bar-style" content="#333333">

    <link rel="manifest" href="https://inversive.space/manifest.json">

    <meta name="apple-mobile-web-app-title" content="Inversive Space">
    <meta name="application-name" content="Inversive Space">

    <meta name="google-site-verification" content="Smqy8g6tSwdId5N51gTeesHkl1hTvZoQXqV6paZfD84" />

    <style>
      * {
        margin: 0;
        padding: 0;
        cursor: default;
      }

      *::selection {
        background: hotpink;
        color: deeppink;
      }

      html, body {
        height: 100%;
        width: 100%;
      }

      html {
        color: silver;
        font-family: "Lucida Console", Monaco, monospace;
      }

      body {
        background-color: #333333;
      }

      .wrapper {
        position: relative;
        height: 100%;
        width: 100%;
      }

      .content {
        position: relative;
      }

      section header {
        height: 53%;
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      section header h1 {
        font-size: 10.17vmin;
          margin-top: auto;
      }

      section .icons {
        height: calc(100% - 10% - 53%);
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      section footer {
        height: 10%;
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      section footer p {
        font-size: 4vmin;
      }

      a {
        text-decoration: none;
        background-color: #444;
        border: 3px solid #444;
        border-bottom-color: #555;
        cursor: pointer;
        transition: all 0.71s;
      }

      a:hover {
        border-color: black;
        background-color: black;
        transition: background-color 1.77s ease, border-color 1.77s ease, border-bottom-color linear 0.17s;
      }

      svg.background {
        background-color: transparent;
        position: absolute;
        top:0;
        left; 0;
        height: 100%;
        width: 100%;
      }

      circle {
        fill: #444;
      }

      .hidden { display: none; }

      .icon svg {
        width: 7.1vmax;
      }
    </style>
  </head>
  <body>
    <section>
      <div class="wrapper">
        <svg class="background"></svg>

        <div class="content">
          <header>
            <h1>Inversive Space</h1>
          </header>

          <div class="icons">
            <span class="icon">
                <svg id="install" class="hidden" role="img" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
                  <path fill="currentColor" d="M504 256c0 137-111 248-248 248S8 393 8 256 119 8 256 8s248 111 248 248zM212 140v116h-70.9c-10.7 0-16.1 13-8.5 20.5l114.9 114.3c4.7 4.7 12.2 4.7 16.9 0l114.9-114.3c7.6-7.6 2.2-20.5-8.5-20.5H300V140c0-6.6-5.4-12-12-12h-64c-6.6 0-12 5.4-12 12z">
                    <animate attributeName="fill" values="silver;black;silver" dur="7.1s" repeatCount="indefinite" />
                  </path>
                </svg>
            </span>
          </div>

          <footer>
            <p>
              di <a id="mywebsite">Gianluca Casati</a>&nbsp;&middot;&nbsp;P.IVA 02551170992
            </p>
          </footer>
        </div>
      </div>
    </section>

    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function () {
          navigator.serviceWorker.register('cache.js', { scope: '/' })
        })
      }

      var deferredInstall

      window.addEventListener('beforeinstallprompt', function (event) {
        event.preventDefault()

        deferredInstall = event

        var installButton = document.getElementById('install')
        installButton.classList.remove('hidden')

        installButton.addEventListener('click', function () {
          if (deferredInstall) {
            deferredInstall.prompt()

            deferredInstall.userChoice.then(function (choiceResult) {
              if (choiceResult.outcome === 'accepted') {
                console.log('User accepted')

                deferredInstall = null
              } else {
                console.log('User dismissed')
              }
            })
          }
        })
      })

      window.addEventListener('appinstalled', function (event) {
        console.log('installed')
      })

      window.addEventListener('DOMContentLoaded', function () {
        var mywebsite = document.getElementById('mywebsite')

        mywebsite.addEventListener('click', function (event) {
          event.preventDefault()

          if (navigator.onLine) {
            window.location.href = 'https://g14n.info'
          }
        })
      })
    </script>

    <script src="animation.js"></script>
  </body>
</html>
