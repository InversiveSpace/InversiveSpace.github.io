      * {
        margin: 0;

      html, body {
        height: 100%;

      html {
        color: silver;
        font-family: "Lucida Console", Monaco, monospace;

      body {
        background-color: #333333;
      }

      section header {
        height: 90%;
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      section header h1 {
        font-size: 10.17vmin;

      section footer {
        height: 10%;
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      section footer p {
        font-size: 4vmin;
      }

      a {
        color: silver;

      }

    </style>

  <body>
    <section>
      <header>
        <h1>Inversive Space</h1>
      </header>
      <footer>
        <p>
          <a href="https://g14n.info">Gianluca Casati</a>&nbsp;&middot;&nbsp;P. IVA 02551170992 

          <span class="icon">
            <svg id="install" class="hidden" role="img" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
              <path fill="currentColor" d="M504 256c0 137-111 248-248 248S8 393 8 256 119 8 256 8s248 111 248 248zM212 140v116h-70.9c-10.7 0-16.1 13-8.5 20.5l114.9 114.3c4.7 4.7 12.2 4.7 16.9 0l114.9-114.3c7.6-7.6 2.2-20.5-8.5-20.5H300V140c0-6.6-5.4-12-12-12h-64c-6.6 0-12 5.4-12 12z"></path>
            </svg>
          </span>
        </p>
      </footer>
    </section>

    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function () {
          navigator.serviceWorker.register('cache.js', { scope: '/' })
        })
      }

      var deferredInstall

      window.addEventListener('beforeinstallprompt', function (event) {
        event.preventDefault()

        deferredInstall = event
        
        var installButton = document.getElementById('install')
        installButton.classList.remove('hidden')

        installButton.addEventListener('click', function () {
          if (deferredInstall) {
            deferredInstall.prompt()
            
            deferredInstall.userChoice.then(function (choiceResult) {
              if (choiceResult.outcome === 'accepted') {
                console.log('User accepted')

                deferredInstall = null
              } else {
                console.log('User dismissed')
              }
            })
          }
        })
      })
      
      window.addEventListener('appinstalled', function (event) {
        console.log('installed')
      })
    </script>
  </body>
